<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Meerdere Tabbladen Openen</title>
</head>
<body>

    <button id="openKnop">Open handige links</button>

    <script>
        document.getElementById('openKnop').addEventListener('click', function() {
            // Door verschillende URL's op te geven, open je meerdere tabbladen
            window.open('https://wikipedia.org', '_blank');
            window.open('https://github.com', '_blank');
            window.open('https://tweakers.net', '_blank');
        });
    </script>

</body>
</html>
