<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snelle Meldingen</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column; /* Stapelt elementen verticaal */
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f4f4f4;
            margin: 0;
            overflow: hidden; /* Voorkomt scrollbalken indien nodig */
        }
        #status {
            font-size: 1.2em; /* Iets kleiner voor snellere weergave */
            color: #333;
            text-align: center;
            padding: 20px; /* Meer ruimte */
            border: 1px solid #ccc;
            border-radius: 8px;
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            min-width: 300px; /* Zorgt dat de box een redelijke breedte heeft */
        }
        #controls {
            margin-top: 30px;
            display: flex;
            gap: 15px; /* Ruimte tussen knoppen */
        }
        button {
            padding: 12px 25px;
            font-size: 1em;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s ease; /* Soepele overgang */
        }
        #stopButton {
            background-color: #f44336; /* Rood voor stoppen */
            color: white;
        }
        #stopButton:hover {
            background-color: #da190b;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="status">
        <p>Meldingen gestart...</p>
    </div>
    <div id="controls">
        <button id="stopButton">Stop Meldingen</button>
    </div>

    <script>
        let intervalId;
        let meldingenActief = true;
        const pauzeTijd = 500; // 500 milliseconden = 0.5 seconden

        function toonMeldingEnVerwerk() {
            if (!meldingenActief) {
                return;
            }

            // De confirm() functie blokkeert de JS-uitvoering tot de gebruiker reageert.
            // De browser wordt weliswaar niet geblokkeerd om te wisselen van tab,
            // maar de confirm-dialoog zelf is een modal die de interactie op deze pagina domineert.
            const wilDoorgaan = confirm("Wil je doorgaan?");

            const statusElement = document.getElementById('status');

            if (wilDoorgaan) {
                statusElement.innerHTML = `<p>${new Date().toLocaleTimeString()}: Geaccepteerd. Actie uitgevoerd!</p>`;
                // Optioneel: De status resetten na een korte tijd om de volgende melding ruimte te geven.
                // Als je wilt dat het bericht langer blijft staan, verhoog de tijd hier.
                setTimeout(() => {
                    if (meldingenActief) { // Alleen resetten als meldingen nog actief zijn
                        statusElement.innerHTML = "<p>Meldingen actief...</p>";
                    }
                }, pauzeTijd - 50); // Reset iets sneller dan de pauze om overlap te voorkomen
            } else {
                statusElement.innerHTML = `<p>${new Date().toLocaleTimeString()}: Niet geaccepteerd. Wachten op volgende melding...</p>`;
                // Als je wilt dat de lus stopt bij 'Cancel', uncomment de volgende regel:
                // stopMeldingen();
                setTimeout(() => {
                    if (meldingenActief) {
                        statusElement.innerHTML = "<p>Meldingen actief...</p>";
                    }
                }, pauzeTijd - 50);
            }
        }

        function stopMeldingen() {
            meldingenActief = false;
            clearInterval(intervalId); // Stop de herhalende functie
            document.getElementById('status').innerHTML = "<p>Meldingen gestopt.</p>";
            document.getElementById('stopButton').classList.add('hidden'); // Verberg de stopknop
            console.log("Meldingen zijn gestopt door de gebruiker.");
        }

        // --- START DE HERHALENDE FUNCTIE ---
        // Dit is het equivalent van de while(true) met time.sleep(0.5)

        // Eerste melding direct bij laden
        toonMeldingEnVerwerk();

        // Start de herhaling
        intervalId = setInterval(toonMeldingEnVerwerk, pauzeTijd);

        // Event listener voor de stopknop
        document.getElementById('stopButton').addEventListener('click', stopMeldingen);

        // Waarschuwing als de gebruiker probeert de pagina te verlaten
        // Dit is de meest effectieve manier om te proberen te voorkomen dat ze de site verlaten
        // zonder de meldingen te stoppen. Het is echter niet waterdicht.
        window.addEventListener('beforeunload', function (e) {
            if (meldingenActief) {
                // De tekst hier wordt niet altijd getoond aan de gebruiker, browsers maken hun eigen bericht.
                const waarschuwing = 'Je bent bezig met een proces dat mogelijk niet gestopt is. Weet je zeker dat je de pagina wilt verlaten?';
                e.preventDefault(); // Standaard manier om te annuleren
                e.returnValue = waarschuwing; // Voor oudere browsers
                return waarschuwing;
            }
            // Als meldingenActief false is, wordt er geen waarschuwing getoond en kan de gebruiker veilig vertrekken.
        });

    </script>

</body>
</html>
